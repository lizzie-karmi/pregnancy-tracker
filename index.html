:root {
  --rose:#e85d75; --rose-light:#fdf0f3; --rose-mid:#fce4ea;
  --emerald:#2e9e6b;
  --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1; --s400:#94a3b8;
  --s500:#64748b; --s600:#475569; --s700:#334155; --s800:#1e293b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--rose-light);color:var(--s800);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px)}
.hdr{background:white;border-bottom:1px solid var(--rose-mid);padding:20px 16px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(232,93,117,.08)}
.hdr-eye{font-size:10px;color:var(--rose);font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.hdr-title{font-size:22px;font-weight:700}
.hdr-sub{font-size:12px;color:var(--s400);margin-top:2px}
.legend{padding:12px 16px 4px;display:flex;flex-wrap:wrap;gap:6px;max-width:600px;margin:0 auto}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.bC{background:#dcfce7;color:#166534}.bMM{background:#e0f2fe;color:#075985}.bM{background:#dbeafe;color:#1e40af}
.bA{background:#fef3c7;color:#92400e}.bZ{background:#ffedd5;color:#9a3412}.bD{background:#fee2e2;color:#991b1b}
.vK{background:#f0fdf4;color:#166534;border:1px solid #86efac}
.vP{background:#faf5ff;color:#6b21a8;border:1px solid #d8b4fe}
.vB{background:#eff6ff;color:#1e40af;border:1px solid #93c5fd}
.tabs-wrap{padding:12px 16px;max-width:600px;margin:0 auto}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 12px;border-radius:12px;font-size:13px;font-weight:500;border:1.5px solid var(--s200);background:white;color:var(--s600);cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'Heebo',sans-serif}
.tab.on{background:var(--rose);border-color:var(--rose);color:white}
.tbadge{font-size:10px;padding:1px 5px;border-radius:10px;font-weight:700}
.tab.on .tbadge{background:rgba(255,255,255,.3);color:white}
.tab:not(.on) .tbadge{background:#dcfce7;color:#166534}
.content{max-width:600px;margin:0 auto;padding:0 16px 32px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:15px;font-weight:600;color:var(--s700)}
.sec-sub{font-size:11px;color:var(--s400);margin-top:1px}
.prog{font-size:11px;color:var(--s500);background:white;border:1px solid var(--s200);border-radius:20px;padding:3px 10px;white-space:nowrap}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:white;border:1.5px solid var(--s200);border-radius:14px;overflow:hidden}
.card.urgent{border-color:#fca5a5}
.card.done{border-color:#bbf7d0;opacity:.65}
.card-head{padding:14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--s400);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;cursor:pointer;background:white}
.chk.on{background:var(--emerald);border-color:var(--emerald)}
.chk-ico{display:none}
.chk.on .chk-ico{display:block}
.card-body{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:4px}
.card.done .card-name{text-decoration:line-through;color:var(--s400)}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.card-weeks{font-size:11px;color:var(--s500)}
.card-dr{font-size:11px;font-weight:600;color:var(--rose);margin-top:2px}
.card-appt{font-size:11px;font-weight:600;color:var(--emerald);margin-top:2px}
.card-chev{color:var(--s300);font-size:11px;margin-top:3px;flex-shrink:0}
.card-exp{display:none;padding:12px 14px 14px;border-top:1px solid var(--s100)}
.card.open .card-exp{display:block}
.card-det{font-size:13px;color:var(--s700);line-height:1.6;margin-bottom:12px}

/* DATE INPUT — always visible inside expanded card */
.appt-block{background:var(--s100);border:1px solid var(--s200);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.appt-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.appt-lbl{font-size:12px;color:var(--s500);font-weight:500}
.appt-val{font-size:12px;font-weight:600;color:var(--emerald);flex:1}
.appt-clear{font-size:12px;color:var(--s400);background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif;padding:0}
.appt-input{display:block;width:100%;max-width:100%;box-sizing:border-box;min-height:42px;line-height:24px;font-size:14px;border:1.5px solid var(--s300);border-radius:8px;padding:8px 10px;background:white;font-family:'Heebo',sans-serif;color:var(--s700);outline:none;direction:ltr;-webkit-appearance:none;appearance:none}
.appt-input:focus{border-color:var(--rose)}

.meta-row{display:flex;flex-wrap:wrap;gap:16px}
.meta-lbl{font-size:10px;color:var(--s400);margin-bottom:2px}
.meta-val{font-size:12px;font-weight:500;color:var(--s600)}
.foot-note{background:white;border:1px solid var(--rose-mid);border-radius:14px;padding:14px;margin-top:20px;font-size:12px;color:var(--s500);line-height:1.6}
</style>
</head>

var activeTab="t1";
var state={};

function loadState(){try{var s=localStorage.getItem("preg-v3");if(s)state=JSON.parse(s);}catch(e){}}
function saveState(){try{localStorage.setItem("preg-v3",JSON.stringify(state));}catch(e){}}
function getItem(sec,idx){return state[sec+"-"+idx]||{checked:false,appt:""};}
function setChecked(sec,idx,val){var k=sec+"-"+idx;var it=state[k]||{};state[k]={checked:val,appt:it.appt||""};saveState();}
function setAppt(sec,idx,val){var k=sec+"-"+idx;var it=state[k]||{};state[k]={checked:it.checked||false,appt:val};saveState();}
function doneCount(sec){var t=TESTS[sec]||[];var n=0;for(var i=0;i<t.length;i++){if(getItem(sec,i).checked)n++;}return n;}

function fmtDate(val){
  if(!val)return "";
  var parts=val.split("T");
  var dp=parts[0].split("-");
  if(dp.length<3)return "";
  var out=dp[2]+"/"+dp[1]+"/"+dp[0].slice(2);
  if(parts.length>1&&parts[1]){var tp=parts[1].split(":");out+=" "+tp[0]+":"+tp[1];}
  return out;
}

function renderTabs(){
  var html="";
  for(var s=0;s<SECTIONS.length;s++){
    var sec=SECTIONS[s];
    var done=doneCount(sec.key);
    var total=(TESTS[sec.key]||[]).length;
    var badge=done>0?'<span class="tbadge">'+done+"/"+total+"</span>":"";
    var cls=activeTab===sec.key?" on":"";
    html+='<button class="tab'+cls+'" onclick="switchTab(\''+sec.key+'\')">'+sec.emoji+" "+sec.label+badge+"</button>";
  }
  document.getElementById("tabs").innerHTML=html;
}

function renderContent(){
  var sec=null;
  for(var s=0;s<SECTIONS.length;s++){if(SECTIONS[s].key===activeTab){sec=SECTIONS[s];break;}}
  var tests=TESTS[activeTab]||[];
  var isPriv=activeTab==="priv";
  var done=doneCount(activeTab);
  var html="";

  html+='<div class="sec-hdr"><div><div class="sec-title">'+sec.emoji+" "+sec.label+"</div>";
  html+='<div class="sec-sub">'+sec.sub+"</div></div>";
  html+='<div class="prog">'+done+"/"+tests.length+" בוצע</div></div>";
  html+='<div class="cards">';

  for(var i=0;i<tests.length;i++){
    var t=tests[i];
    var item=getItem(activeTab,i);
    var cls="card";
    if(item.checked)cls+=" done";
    else if(t.urgent)cls+=" urgent";

    var tags="";
    if(t.tag)tags+='<span class="badge '+TAG[t.tag]+'">'+TAGL[t.tag]+"</span>";
    if(t.venue)tags+='<span class="badge '+VENUE[t.venue]+'">'+VENUEL[t.venue]+"</span>";
    if(t.urgent&&!item.checked)tags+='<span class="badge bD">⚡ דחוף</span>';

    var apptMini=item.appt?'<div class="card-appt">🗓 תור: '+fmtDate(item.appt)+"</div>":"";
    var weeksLine=isPriv?(t.when||""):(t.weeks||"");
    var drLine=t.dr?'<div class="card-dr">📅 '+t.dr+"</div>":"";

    // Appt block — simple visible input, no JS picker tricks
    var apptTop="";
    if(item.appt){
      apptTop='<div class="appt-top">'
        +'<span class="appt-lbl">🗓 תור:</span>'
        +'<span class="appt-val">'+fmtDate(item.appt)+"</span>"
        +'<button class="appt-clear" onclick="event.stopPropagation();clearAppt(\''+activeTab+'\','+i+')">✕</button>'
        +'</div>';
    } else {
      apptTop='<div class="appt-top"><span class="appt-lbl">🗓 קביעת תור:</span></div>';
    }
    var apptBlock='<div class="appt-block" onclick="event.stopPropagation()">'
      +apptTop
      +'<input type="datetime-local" class="appt-input" id="ai-'+activeTab+'-'+i+'"'
      +(item.appt?' value="'+item.appt+'"':'')
      +' onchange="apptChanged(\''+activeTab+'\','+i+',this.value)">'
      +'</div>';

    var costSection=t.cost?'<div class="meta-row"><div><div class="meta-lbl">עלות</div><div class="meta-val">'+t.cost+"</div></div></div>":"";

    html+='<div class="'+cls+'" id="c-'+activeTab+'-'+i+'">';
    html+='<div class="card-head" onclick="toggleCard(\''+activeTab+'\','+i+')">';
    html+='<div class="chk'+(item.checked?" on":"")+'" onclick="event.stopPropagation();toggleCheck(\''+activeTab+'\','+i+')">';
    html+='<svg class="chk-ico" width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html+='</div>';
    html+='<div class="card-body">';
    html+='<div class="card-name">'+t.name+"</div>";
    html+='<div class="card-tags">'+tags+"</div>";
    html+='<div class="card-weeks">'+weeksLine+"</div>";
    html+=drLine;
    html+=apptMini;
    html+="</div>";
    html+='<div class="card-chev">▼</div>';
    html+="</div>";
    html+='<div class="card-exp">';
    html+='<div class="card-det">'+t.det+"</div>";
    html+=apptBlock;
    html+=costSection;
    html+="</div></div>";
  }

  html+="</div>";
  if(FOOT[activeTab])html+='<div class="foot-note">'+FOOT[activeTab]+"</div>";
  document.getElementById("content").innerHTML=html;
}

function render(){renderTabs();renderContent();}
function switchTab(k){activeTab=k;render();window.scrollTo({top:0,behavior:"smooth"});}

function toggleCard(sec,idx){
  var c=document.getElementById("c-"+sec+"-"+idx);
  c.classList.toggle("open");
}

function toggleCheck(sec,idx){
  setChecked(sec,idx,!getItem(sec,idx).checked);
  render();
}

function apptChanged(sec,idx,val){
  setAppt(sec,idx,val);
  // just update display without full re-render to keep card open
  var mini=document.querySelector("#c-"+sec+"-"+idx+" .card-appt");
  if(!mini){
    var body=document.querySelector("#c-"+sec+"-"+idx+" .card-body");
    if(body){
      var d=document.createElement("div");
      d.className="card-appt";
      body.appendChild(d);
      mini=d;
    }
  }
  if(mini)mini.textContent=val?"🗓 תור: "+fmtDate(val):"";
  // update top row in expanded
  var top=document.querySelector("#c-"+sec+"-"+idx+" .appt-top");
  if(top){
    if(val){
      top.innerHTML='<span class="appt-lbl">🗓 תור:</span>'
        +'<span class="appt-val">'+fmtDate(val)+"</span>"
        +'<button class="appt-clear" onclick="event.stopPropagation();clearAppt(\''+sec+'\','+idx+')">✕</button>';
    } else {
      top.innerHTML='<span class="appt-lbl">🗓 קביעת תור:</span>';
    }
  }
}

function clearAppt(sec,idx){
  setAppt(sec,idx,"");
  var el=document.getElementById("ai-"+sec+"-"+idx);
  if(el)el.value="";
  apptChanged(sec,idx,"");
}

loadState();
render();
</script>
</body>
</html>
